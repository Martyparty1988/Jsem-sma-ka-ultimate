<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Jsem smažka? Lokální srandovní sken stavu po večírku. Fotka zůstává v prohlížeči.">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smažka Scan">
  <title>Jsem smažka?</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container" aria-labelledby="appTitle">
    <header class="hero">
      <p class="eyebrow">totálně lokální pseudo AI</p>
      <h1 id="appTitle">Jsem smažka?</h1>
      <p class="subtitle">Sken devastace po večírku. Přísně nevědecké, zato dramatické.</p>
    </header>

    <section class="camera-section" aria-label="Kamera a sken">
      <div class="video-container">
        <video id="video" autoplay muted playsinline></video>
        <div id="cameraError" class="error-message hidden" role="alert"></div>
      </div>

      <p id="scanHint" class="scan-hint">Povol kameru, srovnej obličej doprostřed a spusť sken.</p>

      <div class="preview-container hidden" id="previewContainer">
        <img id="preview" alt="Náhled fotky pro sdílení výsledku">
      </div>

      <div id="generalError" class="error-message hidden" role="alert"></div>

      <div class="button-group">
        <button id="captureButton" class="secondary-button hidden" type="button">
          <span class="button-icon" aria-hidden="true">📸</span>
          <span class="button-text">Vyfotit ručně</span>
        </button>
        <button id="uploadButton" class="secondary-button hidden" type="button">
          <span class="button-icon" aria-hidden="true">📁</span>
          <span class="button-text">Nahrát fotku</span>
        </button>
        <button id="retakeButton" class="secondary-button hidden" type="button">
          <span class="button-icon" aria-hidden="true">🔄</span>
          <span class="button-text">Znovu</span>
        </button>
        <button id="analyzeButton" class="primary-button" type="button">
          <span class="button-icon" aria-hidden="true">🔎</span>
          <span class="button-text">Spustit sken</span>
        </button>
      </div>

      <input type="file" id="uploadInput" accept="image/*" class="hidden">

      <div id="loading" class="loading hidden" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p>Vyhodnocuju damage level…</p>
      </div>
    </section>

    <section id="result" class="result hidden" aria-live="polite"></section>

    <canvas id="canvas" class="hidden" aria-hidden="true"></canvas>

    <footer>
      <p class="privacy-note">Fotka se nikam neposílá. Všechno běží jen v prohlížeči, výsledek je čistě meme a ne diagnóza.</p>
    </footer>

    <noscript>
      <p class="error-message">Bez JavaScriptu tohle kouzlo nejede. Zapni JavaScript a dáme tomu šťávu.</p>
    </noscript>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script defer src="app.js"></script>
  <script defer src="responses-extra.js"></script>
  <script defer src="face-scan.js"></script>
</body>
</html>
